<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400..1000;1,9..40,400..1000&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette — cohesive, modern, accessible */
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --border-focus: #6366f1;
            --text: #0f172a;
            --text-muted: #64748b;
            --text-subtle: #94a3b8;

            --brand: #4f46e5;           /* Primary indigo */
            --brand-hover: #4338ca;
            --brand-light: #eeebff;
            --brand-lighter: #f5f3ff;

            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-light: #eef2ff;
            --primary-lighter: #f5f3ff;

            --accent: #f59e0b;          /* Amber accent */
            --accent-hover: #d97706;
            --accent-light: #fef3c7;

            --success: #10b981;
            --success-light: #ecfdf5;
            --success-dark: #065f46;
            --danger: #ef4444;
            --danger-light: #fef2f2;
            --danger-dark: #991b1b;

            --shadow-sm: 0 1px 2px 0 rgba(15, 23, 42, 0.05);
            --shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.05), 0 2px 4px -2px rgba(15, 23, 42, 0.05);
            --shadow-md: 0 10px 15px -3px rgba(15, 23, 42, 0.08), 0 4px 6px -4px rgba(15, 23, 42, 0.08);
            --shadow-lg: 0 20px 25px -5px rgba(15, 23, 42, 0.12), 0 8px 10px -6px rgba(15, 23, 42, 0.12);

            --radius: 14px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #090d16;
                --card: #131c2e;
                --border: #222f47;
                --border-strong: #2d3f5f;
                --border-focus: #818cf8;
                --text: #f8fafc;
                --text-muted: #94a3b8;
                --text-subtle: #64748b;

                --brand: #818cf8;
                --brand-hover: #6366f1;
                --brand-light: #1e1b4b;
                --brand-lighter: #111033;

                --primary: #818cf8;
                --primary-hover: #6366f1;
                --primary-light: #1e1b4b;
                --primary-lighter: #111033;

                --accent: #fbbf24;
                --accent-hover: #f59e0b;
                --accent-light: #451a03;

                --success: #34d399;
                --success-light: #064e3b;
                --success-dark: #a7f3d0;
                --danger: #f87171;
                --danger-light: #450a0a;
                --danger-dark: #fca5a5;

                --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.4);
                --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.3);
                --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.4);
                --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
            }
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.011em;
        }

        .app {
            max-width: 1440px;
            margin: 0 auto;
            padding: 32px 24px 60px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 16px 0 32px;
        }

        h1 {
            font-family: "DM Sans", sans-serif;
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--text);
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 450;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
            padding: 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .toolbar-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            cursor: pointer;
            transition: transform var(--transition-spring), box-shadow var(--transition), background var(--transition), border-color var(--transition), color var(--transition);
            white-space: nowrap;
            letter-spacing: -0.01em;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:focus-visible { 
            outline: 2px solid var(--border-focus); 
            outline-offset: 2px; 
        }

        .btn-primary { 
            background: var(--primary); 
            color: #ffffff; 
            border-color: var(--primary); 
        }
        .btn-primary:hover { 
            background: var(--primary-hover); 
            border-color: var(--primary-hover);
        }

        .btn-secondary { 
            background: var(--card); 
            color: var(--text); 
            border-color: var(--border); 
        }
        .btn-secondary:hover { 
            background: var(--bg); 
            border-color: var(--border-strong); 
        }

        .btn-ghost { 
            background: transparent; 
            color: var(--text-muted); 
            border-color: transparent; 
        }
        .btn-ghost:hover { 
            background: var(--bg); 
            color: var(--text); 
        }

        .btn-ghost.danger:hover {
            background: var(--danger-light);
            color: var(--danger-dark);
        }

        .btn svg { 
            width: 16px; 
            height: 16px; 
            flex-shrink: 0; 
        }

        .hidden-input {
            display: none;
        }

        /* Layout */
        .layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .layout { 
                grid-template-columns: 1fr; 
            }
        }

        /* Panels */
        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: box-shadow var(--transition), border-color var(--transition);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--card);
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: "DM Sans", sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .panel-title svg { 
            width: 18px; 
            height: 18px; 
            color: var(--primary); 
        }

        .panel-count {
            font-size: 0.75rem;
            padding: 2px 8px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 999px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .panel-body { 
            padding: 16px; 
        }

        /* List Items (Options & Criteria) */
        .item-list { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }

        .item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: transform var(--transition-spring), box-shadow var(--transition), border-color var(--transition), background var(--transition);
        }

        /* Smooth floating lift-up effect */
        .item:hover { 
            transform: translateY(-3px);
            border-color: var(--primary-hover); 
            box-shadow: var(--shadow-md);
            background: var(--card);
        }

        .item.dragging { 
            opacity: 0.4; 
            transform: scale(0.98); 
        }

        .drag-handle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            color: var(--text-subtle);
            cursor: grab;
            border-radius: var(--radius-xs);
            border: none;
            background: transparent;
            flex-shrink: 0;
            transition: background var(--transition), color var(--transition);
        }

        .drag-handle:hover { 
            background: var(--bg); 
            color: var(--text); 
        }
        
        .drag-handle:active { 
            cursor: grabbing; 
            background: var(--primary-light); 
            color: var(--primary); 
        }

        .drag-handle svg { 
            width: 16px; 
            height: 16px; 
        }

        .item-name {
            flex: 1;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .item-input {
            width: 100%;
            padding: 10px 14px;
            font-size: 0.875rem;
            font-weight: 500;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--card);
            color: var(--text);
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .item-input:focus { 
            outline: none; 
            border-color: var(--border-focus); 
            box-shadow: 0 0 0 3px var(--primary-light); 
        }

        .weight-input { 
            width: 60px; 
            text-align: center; 
            font-weight: 700; 
            font-variant-numeric: tabular-nums;
            padding: 8px 4px;
        }

        .item-actions { 
            display: flex; 
            gap: 4px; 
        }

        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            border-radius: var(--radius-xs);
            cursor: pointer;
            transition: transform var(--transition-spring), background var(--transition), color var(--transition);
        }

        .icon-btn:hover { 
            transform: scale(1.1);
            background: var(--bg); 
            color: var(--text); 
        }
        
        .icon-btn.danger:hover { 
            background: var(--danger-light); 
            color: var(--danger); 
        }
        
        .icon-btn svg { 
            width: 16px; 
            height: 16px; 
        }

        /* Add Forms */
        .add-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 16px;
            margin-top: 16px;
            border-top: 1px dashed var(--border);
        }

        .add-form .input-row { 
            display: flex; 
            gap: 8px; 
        }
        
        .add-form .input-row.single { 
            flex-direction: column; 
        }
        
        .add-form input { 
            flex: 1; 
        }

        .add-form button[type="submit"] {
            font-weight: 700;
        }

        /* Matrix Container */
        .matrix-panel { 
            display: flex; 
            flex-direction: column; 
            min-height: 500px; 
        }

        .matrix-wrapper {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        .matrix-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.875rem;
            min-width: 700px;
        }

        .matrix-table thead th {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg);
            padding: 16px 12px;
            text-align: center;
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }

        .matrix-table thead th:first-child {
            text-align: left;
            left: 0;
            z-index: 11;
            border-right: 1.5px solid var(--border);
            background: var(--bg);
            padding-left: 20px;
        }

        .matrix-table thead th:last-child { 
            background: var(--primary-light); 
            color: var(--primary); 
        }

        .matrix-table tbody td {
            padding: 14px 12px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            transition: background var(--transition);
        }

        .matrix-table tbody td:first-child {
            position: sticky;
            left: 0;
            z-index: 5;
            text-align: left;
            background: var(--card);
            border-right: 1.5px solid var(--border);
            font-weight: 600;
            padding-left: 20px;
        }

        .matrix-table tbody tr:hover td { 
            background: var(--bg); 
        }
        
        .matrix-table tbody tr:hover td:first-child { 
            background: var(--bg); 
        }

        /* Custom Highlight for the Winner row */
        .matrix-table tbody tr.winner td {
            background: var(--primary-lighter);
        }

        .matrix-table tbody tr.winner td:first-child {
            border-left: 4px solid var(--accent);
            background: var(--primary-lighter);
        }

        .option-cell { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            min-width: 200px; 
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            font-size: 0.75rem;
            font-weight: 800;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }

        .rank-1 { 
            background: var(--accent-light); 
            color: var(--accent-hover); 
            border: 1px solid var(--accent);
        }
        
        .rank-2 { 
            background: var(--border); 
            color: var(--text-muted); 
            border: 1px solid var(--border-strong);
        }
        
        .rank-3 { 
            background: #ffedd5; 
            color: #ea580c; 
            border: 1px solid #ffedd5;
        }
        
        .rank-other { 
            background: var(--bg); 
            color: var(--text-subtle); 
            border: 1px solid var(--border);
        }

        .score-cell { 
            position: relative; 
            min-width: 100px; 
        }

        /* Custom stylish inputs for score editing */
        .score-input {
            width: 64px;
            padding: 8px 6px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 700;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--card);
            color: var(--text);
            font-variant-numeric: tabular-nums;
            transition: transform var(--transition-spring), border-color var(--transition), box-shadow var(--transition);
        }

        .score-input:hover {
            transform: scale(1.05);
            border-color: var(--border-strong);
        }

        .score-input:focus { 
            outline: none; 
            border-color: var(--border-focus); 
            box-shadow: 0 0 0 3px var(--primary-light); 
            z-index: 3; 
            position: relative; 
            transform: scale(1.08);
        }

        .score-input.empty { 
            color: var(--text-subtle); 
            font-weight: 400;
        }

        .weighted-score {
            display: block;
            margin-top: 5px;
            font-size: 0.725rem;
            font-weight: 700;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
        }

        .total-cell {
            position: sticky;
            right: 0;
            z-index: 5;
            background: var(--bg);
            border-left: 2px solid var(--border);
            font-weight: 800;
            font-size: 1.05rem;
            color: var(--text);
            min-width: 90px;
            font-variant-numeric: tabular-nums;
        }

        .matrix-table tbody tr.winner .total-cell { 
            background: var(--primary-light); 
            color: var(--primary); 
            border-left-color: var(--primary); 
        }

        /* Footer Row Style */
        .matrix-table tfoot tr td {
            padding: 14px 12px;
            background: var(--bg);
            border-top: 2px solid var(--border);
            border-bottom: 2px solid var(--border);
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 320px;
            padding: 40px 24px;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state svg { 
            width: 72px; 
            height: 72px; 
            margin-bottom: 20px; 
            opacity: 0.5; 
            color: var(--primary);
        }
        
        .empty-state p { 
            font-size: 1.1rem; 
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px; 
        }
        
        .empty-state .hint { 
            font-size: 0.875rem; 
            color: var(--text-muted);
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 600;
            box-shadow: var(--shadow-lg);
            transform: translateY(100px);
            opacity: 0;
            transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show { 
            transform: translateY(0); 
            opacity: 1; 
        }
        
        .toast.success { 
            background: var(--success); 
            color: #ffffff; 
        }
        
        .toast.error { 
            background: var(--danger); 
            color: #ffffff; 
        }
        
        .toast.info { 
            background: var(--primary); 
            color: #ffffff; 
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { 
                transition-duration: 0.01ms !important; 
                animation-duration: 0.01ms !important; 
            }
        }

        /* Dynamic Custom Scrollbar */
        ::-webkit-scrollbar { 
            width: 8px; 
            height: 8px; 
        }
        
        ::-webkit-scrollbar-track { 
            background: transparent; 
        }
        
        ::-webkit-scrollbar-thumb { 
            background: var(--border-strong); 
            border-radius: 4px; 
        }
        
        ::-webkit-scrollbar-thumb:hover { 
            background: var(--text-subtle); 
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <h1>Decision Matrix</h1>
            <p class="subtitle">Evaluate options against weighted criteria cleanly</p>
        </header>

        <!-- Cleaned-up Toolbar Actions -->
        <div class="toolbar">
            <div class="toolbar-group">
                <button class="btn btn-secondary" id="exportBtn" aria-label="Export to JSON">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    <span>Export</span>
                </button>
                <button class="btn btn-secondary" id="importBtn" aria-label="Import from JSON">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <span>Import</span>
                </button>
                <input type="file" id="importFile" accept=".json" class="hidden-input" aria-hidden="true">
            </div>
            <div class="toolbar-group">
                <button class="btn btn-ghost" id="randomizeBtn" aria-label="Randomize scores">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><path d="M3.29 6.97a7.5 7.5 0 0 1 10.61 0"></path><path d="M21.24 16.78a7.5 7.5 0 0 1-10.61 0"></path></svg>
                    <span>Randomize</span>
                </button>
                <button class="btn btn-ghost danger" id="clearBtn" aria-label="Clear all data">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    <span>Clear Workspace</span>
                </button>
            </div>
        </div>

        <div class="layout">
            <!-- Sidebar Navigation Panels -->
            <aside>
                <!-- Criteria section -->
                <section class="panel" aria-labelledby="criteria-title">
                    <div class="panel-header">
                        <h2 class="panel-title" id="criteria-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg>
                            Criteria
                        </h2>
                        <span class="panel-count" id="criteriaCount">0</span>
                    </div>
                    <div class="panel-body">
                        <div class="item-list" id="criteriaList" role="list" aria-label="Criteria list"></div>
                        <form class="add-form" id="criterionForm" aria-label="Add criterion">
                            <div class="input-row">
                                <input type="text" id="newCriterionName" placeholder="Name (e.g., Cost, Quality)" class="item-input" aria-label="Criterion name" required autocomplete="off">
                                <input type="number" id="newCriterionWeight" placeholder="Weight" min="1" max="10" value="5" class="item-input weight-input" aria-label="Weight (1-10)">
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Add Criterion</button>
                        </form>
                    </div>
                </section>

                <!-- Options section -->
                <section class="panel" style="margin-top: 24px;" aria-labelledby="options-title">
                    <div class="panel-header">
                        <h2 class="panel-title" id="options-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M9 9l6 6M15 9l-6 6"></path></svg>
                            Options
                        </h2>
                        <span class="panel-count" id="optionsCount">0</span>
                    </div>
                    <div class="panel-body">
                        <div class="item-list" id="optionsList" role="list" aria-label="Options list"></div>
                        <form class="add-form" id="optionForm" aria-label="Add option">
                            <div class="input-row single">
                                <input type="text" id="newOptionName" placeholder="Name (e.g., Option A)" class="item-input" aria-label="Option name" required autocomplete="off">
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Add Option</button>
                        </form>
                    </div>
                </section>
            </aside>

            <!-- Main Interactive Matrix Layout Grid -->
            <main class="panel matrix-panel" aria-label="Decision matrix">
                <div class="matrix-wrapper" id="matrixWrapper">
                    <table class="matrix-table" id="matrixTable" role="grid" aria-label="Decision scores">
                        <thead>
                            <tr id="tableHeader" role="row">
                                <th role="columnheader" scope="col">Options / Criteria</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" role="rowgroup"></tbody>
                        <tfoot id="tableFooter" role="rowgroup"></tfoot>
                    </table>
                    <div class="empty-state" id="emptyState" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M9 9l6 6M15 9l-6 6"></path></svg>
                        <p>No criteria or options specified</p>
                        <span class="hint">Use the sidebar panels on the left to add items • Drag blocks to reorder them</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Status feedback element -->
    <div class="toast" id="toast" role="status" aria-live="polite" aria-hidden="true"></div>

    <script>
        // ============ STATE ============
        let criteria = [];  // { id, name, weight }
        let options = [];   // { id, name }
        let scores = {};    // `${optId}-${critId}` -> score (1-10)

        // ============ DOM ============
        const criteriaList = document.getElementById('criteriaList');
        const optionsList = document.getElementById('optionsList');
        const tableHeader = document.getElementById('tableHeader');
        const tableBody = document.getElementById('tableBody');
        const tableFooter = document.getElementById('tableFooter');
        const emptyState = document.getElementById('emptyState');
        const matrixWrapper = document.getElementById('matrixWrapper');
        const criteriaCount = document.getElementById('criteriaCount');
        const optionsCount = document.getElementById('optionsCount');
        const toast = document.getElementById('toast');

        // ============ UTIL ============
        const uid = () => Date.now() + Math.random();
        const esc = (s) => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };

        function showToast(msg, type = 'info') {
            toast.textContent = msg;
            toast.className = `toast ${type} show`;
            toast.setAttribute('aria-hidden', 'false');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.className = 'toast';
                toast.setAttribute('aria-hidden', 'true');
            }, 2500);
        }

        // ============ DATA OPS ============
        function addCriterion(name, weight = 5) {
            criteria.push({ id: uid(), name, weight: clamp(weight, 1, 10) });
        }
        function removeCriterion(id) {
            criteria = criteria.filter(c => c.id !== id);
            Object.keys(scores).forEach(k => { if (k.split('-')[1] == id) delete scores[k]; });
        }
        function updateCriterionWeight(id, w) { const c = criteria.find(x => x.id === id); if (c) c.weight = clamp(w, 1, 10); }

        function addOption(name) { options.push({ id: uid(), name }); }
        function removeOption(id) {
            options = options.filter(o => o.id !== id);
            Object.keys(scores).forEach(k => { if (k.split('-')[0] == id) delete scores[k]; });
        }

        function setScore(optId, critId, val) {
            const v = parseInt(val);
            if (!isNaN(v)) scores[`${optId}-${critId}`] = clamp(v, 1, 10);
            else delete scores[`${optId}-${critId}`];
        }
        function getScore(optId, critId) { return scores[`${optId}-${critId}`] ?? ''; }
        function getWeighted(optId, critId) {
            const s = getScore(optId, critId);
            const c = criteria.find(x => x.id === critId);
            return (s && c) ? (s * c.weight).toFixed(1) : '';
        }
        function getTotal(optId) {
            let t = 0; criteria.forEach(c => { const w = getWeighted(optId, c.id); if (w) t += parseFloat(w); });
            return t.toFixed(1);
        }
        const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

        // ============ RENDER ============
        function renderAll() {
            renderCriteria();
            renderOptions();
            renderMatrix();
            criteriaCount.textContent = criteria.length;
            optionsCount.textContent = options.length;
        }

        // --- Criteria List ---
        function renderCriteria() {
            criteriaList.innerHTML = '';
            criteria.forEach(c => {
                const el = document.createElement('div');
                el.className = 'item';
                el.draggable = true;
                el.dataset.id = c.id;
                el.setAttribute('role', 'listitem');
                el.innerHTML = `
                    <button class="drag-handle" aria-label="Drag to reorder ${esc(c.name)}" tabindex="0">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <span class="item-name">${esc(c.name)}</span>
                    <input type="number" class="item-input weight-input" value="${c.weight}" min="1" max="10" data-id="${c.id}" aria-label="Weight for ${esc(c.name)}">
                    <div class="item-actions">
                        <button class="icon-btn danger" data-id="${c.id}" aria-label="Remove ${esc(c.name)}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                    </div>
                `;
                criteriaList.appendChild(el);
            });
            enableDrag(criteriaList, criteria, renderCriteria);
            attachCriteriaListeners();
        }

        // --- Options List ---
        function renderOptions() {
            optionsList.innerHTML = '';
            options.forEach(o => {
                const el = document.createElement('div');
                el.className = 'item';
                el.draggable = true;
                el.dataset.id = o.id;
                el.setAttribute('role', 'listitem');
                el.innerHTML = `
                    <button class="drag-handle" aria-label="Drag to reorder ${esc(o.name)}" tabindex="0">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <span class="item-name">${esc(o.name)}</span>
                    <div class="item-actions">
                        <button class="icon-btn danger" data-id="${o.id}" aria-label="Remove ${esc(o.name)}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                    </div>
                `;
                optionsList.appendChild(el);
            });
            enableDrag(optionsList, options, renderOptions);
            attachOptionsListeners();
        }

        // --- Matrix ---
        function renderMatrix() {
            if (criteria.length === 0 || options.length === 0) {
                emptyState.hidden = false;
                emptyState.style.display = 'flex';
                matrixWrapper.style.display = 'none';
                return;
            }
            emptyState.hidden = true;
            emptyState.style.display = 'none';
            matrixWrapper.style.display = 'block';

            // Header
            tableHeader.innerHTML = '<th role="columnheader" scope="col">Options / Criteria</th>';
            criteria.forEach(c => {
                const th = document.createElement('th');
                th.setAttribute('role', 'columnheader');
                th.setAttribute('scope', 'col');
                th.innerHTML = `${esc(c.name)}<br><span style="font-weight:600;font-size:0.65rem;color:var(--text-muted)">WT: ${c.weight}</span>`;
                tableHeader.appendChild(th);
            });
            const totalTh = document.createElement('th');
            totalTh.setAttribute('role', 'columnheader');
            totalTh.setAttribute('scope', 'col');
            totalTh.textContent = 'TOTAL';
            totalTh.style.cssText = 'background:var(--primary-light);color:var(--primary)';
            tableHeader.appendChild(totalTh);

            // Compute the real ranks dynamically by evaluating a sorted copy of options
            const rankedOptions = options.map(o => ({ id: o.id, total: parseFloat(getTotal(o.id)) }))
                .sort((a, b) => b.total - a.total);

            // Establish rank position maps (handling duplicate scores as shared ranks if needed)
            const rankMap = {};
            rankedOptions.forEach((item, index) => {
                rankMap[item.id] = index + 1;
            });

            // Check if any score field has input data before assigning a highlight
            const hasAnyScores = options.some(o => criteria.some(c => getScore(o.id, c.id) !== ''));

            // Body (rendered strictly in the persistent original order of the options array)
            tableBody.innerHTML = '';
            options.forEach(option => {
                const total = parseFloat(getTotal(option.id));
                const rank = rankMap[option.id];
                const isWinner = (rank === 1 && hasAnyScores);

                const tr = document.createElement('tr');
                tr.setAttribute('role', 'row');
                if (isWinner) tr.classList.add('winner');

                let html = `<td role="gridcell"><div class="option-cell">`;
                const badgeClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
                html += `<span class="rank-badge ${badgeClass}" aria-label="Rank ${rank}">${rank}</span>`;
                html += `<span class="item-name">${esc(option.name)}</span></div></td>`;

                criteria.forEach(c => {
                    const score = getScore(option.id, c.id);
                    const weighted = getWeighted(option.id, c.id);
                    const emptyClass = score ? '' : ' empty';
                    html += `<td role="gridcell" class="score-cell">`;
                    html += `<input type="number" class="score-input ${emptyClass}" value="${score}" min="1" max="10" data-opt="${option.id}" data-crit="${c.id}" aria-label="Score for ${esc(option.name)} on ${esc(c.name)}" placeholder="1–10">`;
                    if (weighted) html += `<span class="weighted-score">×${c.weight} = ${weighted}</span>`;
                    html += `</td>`;
                });

                html += `<td role="gridcell" class="total-cell" aria-label="Total weighted score">${total.toFixed(1)}</td>`;
                tr.innerHTML = html;
                tableBody.appendChild(tr);
            });

            // Footer
            tableFooter.innerHTML = '';
            const footerRow = document.createElement('tr');
            footerRow.setAttribute('role', 'row');
            
            let footerHtml = '<td role="gridcell" style="text-align:left;padding-left:20px;font-weight:700;font-size:0.75rem;text-transform:uppercase;color:var(--text-muted);border-right:1.5px solid var(--border)">WEIGHTS</td>';
            criteria.forEach(c => {
                footerHtml += `<td role="gridcell" style="font-weight:700;color:var(--text);font-variant-numeric: tabular-nums;">${c.weight}</td>`;
            });
            const grandTotal = rankedOptions.reduce((s, r) => s + r.total, 0).toFixed(1);
            footerHtml += `<td role="gridcell" style="background:var(--primary-light);color:var(--primary);font-weight:800;font-variant-numeric: tabular-nums;">${grandTotal}</td>`;
            footerRow.innerHTML = footerHtml;
            tableFooter.appendChild(footerRow);

            attachMatrixListeners();
        }

        // ============ DRAG & DROP ============
        function enableDrag(listEl, arr, renderFn) {
            let dragged = null;
            listEl.querySelectorAll('.item').forEach(item => {
                item.addEventListener('dragstart', e => {
                    dragged = item;
                    item.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });
                item.addEventListener('dragend', () => { item.classList.remove('dragging'); dragged = null; });
                item.addEventListener('dragover', e => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    const after = getDragAfter(listEl, e.clientY);
                    if (after) listEl.insertBefore(dragged, after); else listEl.appendChild(dragged);
                });
            });
            listEl.addEventListener('drop', () => {
                const order = [...listEl.querySelectorAll('.item')].map(el => Number(el.dataset.id));
                arr.sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
                renderFn();
            });
        }

        function getDragAfter(container, y) {
            const els = [...container.querySelectorAll('.item:not(.dragging)')];
            return els.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) return { offset, element: child };
                return closest;
            }, { offset: -Infinity }).element;
        }

        // ============ EVENT LISTENERS ============
        function attachCriteriaListeners() {
            criteriaList.querySelectorAll('.weight-input').forEach(input => {
                input.addEventListener('change', e => {
                    updateCriterionWeight(Number(e.target.dataset.id), parseInt(e.target.value) || 5);
                    renderMatrix();
                });
            });
            criteriaList.querySelectorAll('.icon-btn.danger').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    removeCriterion(Number(btn.dataset.id));
                    showToast('Criterion removed', 'success');
                    renderAll();
                });
            });
        }

        function attachOptionsListeners() {
            optionsList.querySelectorAll('.icon-btn.danger').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    removeOption(Number(btn.dataset.id));
                    showToast('Option removed', 'success');
                    renderAll();
                });
            });
        }

        function attachMatrixListeners() {
            tableBody.querySelectorAll('.score-input').forEach(input => {
                input.addEventListener('change', e => {
                    const opt = Number(e.target.dataset.opt);
                    const crit = Number(e.target.dataset.crit);
                    const val = e.target.value;
                    setScore(opt, crit, val);
                    e.target.classList.toggle('empty', !val);
                    renderMatrix();
                });
                input.addEventListener('keydown', e => {
                    if (e.key === 'Enter') e.target.blur();
                    if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
                        e.preventDefault();
                        const cells = [...tableBody.querySelectorAll('.score-input')];
                        const idx = cells.indexOf(e.target);
                        const next = cells[idx + (e.key === 'ArrowRight' ? 1 : -1)];
                        if (next) next.focus();
                    }
                });
            });
        }

        // ============ EXPORT / IMPORT ============
        function exportData() {
            const data = { criteria: criteria.map(c => ({ name: c.name, weight: c.weight })), options: options.map(o => ({ name: o.name })), scores };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `decision-matrix-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported successfully', 'success');
        }

        function importData(file) {
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const d = JSON.parse(e.target.result);
                    criteria = (d.criteria || []).map(c => ({ id: uid(), ...c }));
                    options = (d.options || []).map(o => ({ id: uid(), ...o }));
                    scores = d.scores || {};
                    renderAll();
                    showToast('Imported successfully', 'success');
                } catch { showToast('Invalid file format', 'error'); }
            };
            reader.readAsText(file);
        }

        // ============ INITIAL SEED DATA ============
        function seed() {
            addCriterion('Cost', 8);
            addCriterion('Quality', 9);
            addCriterion('Implementation', 6);
            addCriterion('Risk Level', 7);
            addCriterion('Scalability', 5);
            addOption('Option A');
            addOption('Option B');
            addOption('Option C');
            
            const sample = [
                [7, 6, 8, 5, 7], // Option A
                [5, 8, 5, 6, 6], // Option B
                [6, 7, 7, 8, 5], // Option C
            ];
            options.forEach((o, i) => criteria.forEach((c, j) => scores[`${o.id}-${c.id}`] = sample[i][j]));
        }

        // ============ UI FORM ACTIONS ============
        document.getElementById('criterionForm').addEventListener('submit', e => {
            e.preventDefault();
            const nameInput = document.getElementById('newCriterionName');
            const weightInput = document.getElementById('newCriterionWeight');
            const name = nameInput.value.trim();
            const weight = parseInt(weightInput.value) || 5;
            if (name) { 
                addCriterion(name, weight); 
                nameInput.value = '';
                weightInput.value = '5';
                renderAll(); 
                showToast('Criterion added', 'success'); 
            } else {
                showToast('Enter a valid name', 'error');
            }
        });

        document.getElementById('optionForm').addEventListener('submit', e => {
            e.preventDefault();
            const nameInput = document.getElementById('newOptionName');
            const name = nameInput.value.trim();
            if (name) { 
                addOption(name); 
                nameInput.value = '';
                renderAll(); 
                showToast('Option added', 'success'); 
            } else {
                showToast('Enter a valid name', 'error');
            }
        });

        document.getElementById('exportBtn').addEventListener('click', exportData);
        document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
        document.getElementById('importFile').addEventListener('change', e => { if (e.target.files[0]) { importData(e.target.files[0]); e.target.value = ''; } });
        document.getElementById('clearBtn').addEventListener('click', () => { if (confirm('Clear matrix parameters and scores?')) { criteria = []; options = []; scores = {}; renderAll(); showToast('Cleared workspace', 'success'); } });
        document.getElementById('randomizeBtn').addEventListener('click', () => {
            if (!criteria.length || !options.length) return showToast('Add some items first', 'error');
            options.forEach(o => criteria.forEach(c => scores[`${o.id}-${c.id}`] = Math.floor(Math.random() * 10) + 1));
            renderMatrix(); 
            showToast('Randomized table scores', 'success');
        });

        // Global shortcuts configuration
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); exportData(); }
            if ((e.ctrlKey || e.metaKey) && e.key === 'o') { e.preventDefault(); document.getElementById('importFile').click(); }
        });

        // Render runtime sequence
        seed();
        renderAll();
    </script>
</body>
</html>
