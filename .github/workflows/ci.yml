name: PulseScope CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  IDF_VERSION: v5.2.1

jobs:
  firmware-lint:
    name: Firmware Lint (clang-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-15

      - name: Check formatting
        run: |
          cd firmware
          find src include -name '*.c' -o -name '*.h' | xargs clang-format-15 --dry-run --Werror

  firmware-build:
    name: Firmware Build (ESP-IDF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          install_tools: true

      - name: Configure project
        run: |
          cd firmware
          idf.py set-target esp32s3

      - name: Build firmware
        run: |
          cd firmware
          idf.py build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            firmware/build/*.bin
            firmware/build/*.elf
            firmware/build/*.map

  host-test:
    name: Host Tests (Python)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd host
          pip install -e .[dev]

      - name: Run linters
        run: |
          cd host
          ruff check src/
          mypy src/

      - name: Run tests
        run: |
          cd host
          pytest -v --cov=pulsescope --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./host/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  integration-test:
    name: Integration Test (Hardware)
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [firmware-build, host-test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}

      - name: Flash firmware
        run: |
          cd firmware
          idf.py flash

      - name: Run host integration tests
        run: |
          cd host
          pip install -e .[dev]
          # Hardware tests would go here
          # pytest tests/integration/ -v

  docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd host
          pip install -e .[dev]
          pip install sphinx sphinx-rtd-theme breathe

      - name: Build docs
        run: |
          cd docs
          sphinx-build -b html . _build/html
          # Or use MkDocs if preferred

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [firmware-build, host-test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: firmware-artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            firmware-artifacts/*.bin
            firmware-artifacts/*.elf
            firmware-artifacts/*.map
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}